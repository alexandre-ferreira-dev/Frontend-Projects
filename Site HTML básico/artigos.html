<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigos - Meu Site Simples</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        nav { background-color: #333; padding: 1rem; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; }
        nav ul li { margin: 0 1rem; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; }
        nav ul li a:hover { color: #ddd; }
        main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .active { background-color: #555; }
        article { margin-bottom: 2rem; padding: 1rem; background: white; border-radius: 8px; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Página Inicial</a></li>
            <li><a href="projetos.html">Projetos</a></li>
            <li><a href="artigos.html" class="active">Artigos</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <main>
        <h1>Meus Artigos</h1>
        <p>Leia meus artigos sobre desenvolvimento web.</p>
        
        <article>
            <h2>Como Criar um Site com HTML Puro</h2>
            <p><strong>Detalhe:</strong> Use DOCTYPE, head com meta tags para charset e viewport (responsivo). Body com nav e main semânticos. Estilos inline no <style> para simplicidade.</p>
        </article>
        
        <article>
            <h2>Boas Práticas de Navegação</h2>
            <p><strong>Detalhe:</strong> Nav com ul/li/a. Classe 'active' destaca página atual. Flexbox para centralizar e responsivo. Hover para UX.</p>
        </article>
        
        <p><a href="index.html">Voltar à Página Inicial</a></p>
    </main>
</body>
</html>
