<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato - Meu Site Simples</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
        color: #333;
      }
      nav {
        background-color: #333;
        padding: 1rem;
      }
      nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
      }
      nav ul li {
        margin: 0 1rem;
      }
      nav ul li a {
        color: white;
        text-decoration: none;
        font-weight: bold;
      }
      nav ul li a:hover {
        color: #ddd;
      }
      main {
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .active {
        background-color: #555;
      }
      form {
        background: white;
        padding: 2rem;
        border-radius: 8px;
      }
      label {
        display: block;
        margin: 1rem 0 0.5rem;
      }
      input,
      textarea {
        width: 100%;
        padding: 0.5rem;
        margin-bottom: 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        background: #333;
        color: white;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Página Inicial</a></li>
        <li><a href="projetos.html">Projetos</a></li>
        <li><a href="artigos.html">Artigos</a></li>
        <li><a href="contato.html" class="active">Contato</a></li>
      </ul>
    </nav>

    <main>
      <h1>Entre em Contato</h1>
      <p>
        Envie uma mensagem usando o formulário abaixo.
        <strong>Detalhe:</strong> Form HTML com labels, inputs e textarea. Sem
        backend, mas pronto para integração futura.
      </p>

      <form>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

        <button type="submit">Enviar</button>
      </form>

      <p><strong>Ou envie email direto:</strong> exemplo@email.com</p>
      <p><a href="index.html">Voltar à Página Inicial</a></p>
    </main>
  </body>
</html>
